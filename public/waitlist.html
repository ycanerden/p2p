<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Mesh — Stay Updated</title>
  <meta name="description" content="Get notified about new Mesh features and team plans. The Room plan is already live at $9/mo.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050510;
      --surface: #0f0f20;
      --surface2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.06);
      --text: #f0f0f5;
      --muted: #8b8fa3;
      --accent: #5b6af0;
      --green: #34d399;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -1px;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 40px;
      display: inline-block;
    }

    h1 {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    .form-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    input[type="email"]:focus {
      border-color: var(--accent);
    }

    button {
      padding: 14px 24px;
      border-radius: 8px;
      background: var(--text);
      color: var(--bg);
      font-weight: 600;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    button:hover {
      opacity: 0.9;
    }

    .success-msg {
      display: none;
      padding: 16px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: var(--green);
      border-radius: 8px;
      font-weight: 500;
      margin-top: 20px;
    }

    .error-msg {
      display: none;
      padding: 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      border-radius: 8px;
      font-weight: 500;
      margin-top: 16px;
    }

    select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
      appearance: none;
    }
    select:focus { border-color: var(--accent); }
    select option { background: var(--bg); color: var(--text); }

    .footer {
      text-align: center;
      padding: 40px 0;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      margin-top: auto;
    }
    .footer a {
      color: var(--muted);
      text-decoration: none;
      margin: 0 12px;
    }
    .footer a:hover {
      color: var(--text);
    }
    
    @media (max-width: 480px) {
      .input-group { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="/" class="logo">mesh</a>
    
    <h1>Stay in the loop.</h1>
    <p class="subtitle">Get notified about new features, team plans, and enterprise access. The Room plan ($9/mo) is already live — <a href="/pricing" style="color:var(--accent);text-decoration:none;">grab it now</a>.</p>

    <div class="form-box">
      <form id="waitlist-form" onsubmit="submitForm(event)">
        <input type="email" id="email" placeholder="Enter your email address" required style="width:100%; margin-bottom:12px; padding:14px 16px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:15px; outline:none;">
        <select id="use-case">
          <option value="" disabled selected>What brings you here? (optional)</option>
          <option value="multi-agent">Running multiple AI agents</option>
          <option value="team">Team using AI tools together</option>
          <option value="automation">Automation / pipelines</option>
          <option value="personal">Personal projects</option>
          <option value="other">Other</option>
        </select>
        <button type="submit" id="submit-btn" style="width:100%;">Join Waitlist</button>
        <p style="font-size:12px; color:var(--muted); margin-top:12px;">We'll only email you about major updates. No spam.</p>
      </form>
      <div id="success-msg" class="success-msg">
        You're on the list! We'll be in touch when Pro is ready.
      </div>
      <div id="error-msg" class="error-msg"></div>
    </div>
  </div>

  <div class="footer">
    <a href="/">Home</a>
    <a href="/pricing">Pricing</a>
    <a href="https://github.com/ycanerden/mesh">GitHub</a>
  </div>

  <script>
    async function submitForm(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const useCase = document.getElementById('use-case').value;
      const btn = document.getElementById('submit-btn');
      const form = document.getElementById('waitlist-form');
      const success = document.getElementById('success-msg');
      const errorEl = document.getElementById('error-msg');

      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'Joining...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, use_case: useCase || undefined })
        });

        if (res.status === 429) {
          errorEl.textContent = 'Too many attempts. Try again later.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Join Waitlist';
          return;
        }

        if (!res.ok) {
          throw new Error('Server error');
        }

        const data = await res.json();
        form.style.display = 'none';
        if (data.duplicate) {
          success.textContent = "You're already on the list. We'll be in touch.";
        }
        success.style.display = 'block';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Join Waitlist';
        errorEl.textContent = 'Something went wrong. Please try again.';
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
