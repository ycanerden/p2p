<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Mesh — Private Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050510;
      --surface: #0f0f20;
      --border: rgba(255,255,255,0.06);
      --text: #f0f0f5;
      --muted: #8b8fa3;
      --accent: #5b6af0;
      --red: #ef4444;
      --radius: 12px;
    }
    [data-theme="light"] body{background:#ffffff;color:#0a1628;}
    [data-theme="light"] *{border-color:rgba(0,0,0,0.08);}
    .icon-sun,[data-theme="light"] .icon-moon{display:none;}
    [data-theme="light"] .icon-sun{display:block;}

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .icon {
      font-size: 32px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .room-name {
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--accent);
      font-weight: 500;
    }

    p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      background: var(--text);
      color: var(--bg);
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error {
      color: var(--red);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <div style="position:fixed;top:16px;right:16px;">
    <button onclick="toggleTheme()" aria-label="Toggle theme" style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:none;color:#52566a;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Private Room</h1>
    <p>Room <span class="room-name" id="room-code">---</span> is protected. Enter the password to join.</p>

    <form id="auth-form" onsubmit="submitForm(event)">
      <input type="password" id="password" placeholder="Room password" required autofocus>
      <button type="submit" id="submit-btn">Unlock Room</button>
      <div id="error-msg" class="error">Invalid password. Please try again.</div>
    </form>
  </div>

  <script>
function getTheme(){return localStorage.getItem('mesh-theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark')}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('mesh-theme',t)}
function toggleTheme(){applyTheme(getTheme()==='dark'?'light':'dark')}
applyTheme(getTheme());
</script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room');
    const redirect = urlParams.get('redirect') || '/office';
    
    if (!room) {
      window.location.href = '/rooms';
    }

    document.getElementById('room-code').textContent = room;

    async function submitForm(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');

      if (!password) return;

      btn.disabled = true;
      btn.textContent = 'Verifying...';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch(`/api/rooms/${encodeURIComponent(room)}/auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        const data = await res.json();
        
        if (data.ok && data.access_token) {
          // Save the token to local storage so other pages can pick it up
          localStorage.setItem(`mesh-token-${room}`, data.access_token);
          
          // Redirect to the destination with the token in the URL for immediate access
          window.location.href = `${redirect}?room=${encodeURIComponent(room)}&access_token=${encodeURIComponent(data.access_token)}`;
        } else {
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Unlock Room';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Unlock Room';
      }
    }
  </script>
</body>
</html>
