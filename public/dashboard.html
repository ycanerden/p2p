<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Mesh — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared.css">
  <style>
    :root {
      --sidebar-w: 260px;
      --topbar-h: 52px;
    }

    body { overflow: hidden; }

    /* ===== TOP BAR ===== */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: var(--topbar-h);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      backdrop-filter: blur(24px);
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: #fff;
      text-decoration: none;
    }
    .topbar-title {
      text-decoration: none; color: inherit;
    }
    .topbar-title h1 {
      font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
      color: var(--text);
    }
    .topbar-title .subtitle {
      font-size: 11px; color: var(--text3); margin-top: 1px;
    }
    .topbar-center { display: flex; align-items: center; gap: 10px; }
    .room-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; color: var(--text);
      font-size: 13px; font-family: 'JetBrains Mono', monospace;
      outline: none; width: 160px; transition: border-color .15s;
    }
    .room-input:focus { border-color: var(--accent); }
    .room-input::placeholder { color: var(--text3); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .conn-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 6px;
      background: var(--green-dim); border: 1px solid var(--border);
    }
    .conn-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    }
    .conn-dot.offline { background: var(--red); }
    .conn-label { font-size: 11px; color: var(--green); font-weight: 600; }
    .conn-label.offline { color: var(--red); }
    .mobile-menu-btn {
      display: none; background: none; border: 1px solid var(--border);
      color: var(--text); width: 36px; height: 36px; border-radius: 6px;
      cursor: pointer; font-size: 18px; align-items: center; justify-content: center;
    }

    /* ===== LAYOUT ===== */
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: calc(100vh - var(--topbar-h));
      margin-top: var(--topbar-h);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-scroll {
      flex: 1; overflow-y: auto; padding: 16px;
    }
    .sidebar-heading {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text3); margin-bottom: 12px; font-weight: 500;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-heading .count {
      background: var(--surface2); border-radius: 8px;
      padding: 1px 8px; font-size: 10px; color: var(--text2);
    }

    /* Agent list */
    .agent-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 6px; margin-bottom: 3px;
      transition: background .15s;
    }
    .agent-item:hover { background: var(--surface2); }
    .agent-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .agent-dot.online { background: var(--green); }
    .agent-dot.offline { background: var(--text3); }
    .agent-name {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .agent-name.offline { color: var(--text3); }
    .agent-time {
      font-size: 10px; color: var(--text3); margin-left: auto; white-space: nowrap;
    }

    /* Admin panel */
    .admin-section {
      border-top: 1px solid var(--border);
      padding: 16px;
    }
    .admin-heading {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text3); margin-bottom: 10px; font-weight: 500;
    }
    .admin-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .admin-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; color: var(--text);
      font-size: 12px; font-family: inherit; outline: none;
    }
    .admin-input:focus { border-color: var(--accent); }
    .admin-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; color: var(--text2);
      font-size: 11px; font-weight: 500; cursor: pointer;
      transition: all .15s;
    }
    .admin-btn:hover { border-color: var(--accent); color: var(--accent); }
    .admin-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .admin-toggle {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text2); cursor: pointer;
    }
    .admin-toggle input { accent-color: var(--accent); }

    /* ===== MAIN ===== */
    .main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    /* Messages */
    .messages-area {
      flex: 1; overflow-y: auto; padding: 24px 32px;
      display: flex; flex-direction: column;
    }
    .messages-list { display: flex; flex-direction: column; gap: 2px; }

    .msg {
      padding: 6px 0; font-size: 14px; line-height: 1.55;
      word-wrap: break-word;
    }
    .msg-header {
      display: inline;
    }
    .msg-time {
      font-size: 11px; color: var(--text3); margin-right: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
    }
    .msg-sender {
      font-weight: 600; font-size: 13px; margin-right: 6px;
    }
    .msg-type-badge {
      font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .3px; margin-right: 6px;
      vertical-align: middle;
    }
    .msg-type-badge.task { background: var(--orange-dim); color: var(--orange); }
    .msg-type-badge.handoff { background: var(--green-dim); color: var(--green); }
    .msg-type-badge.direct { background: var(--accent-dim); color: var(--accent2); }
    .msg-type-badge.status { background: var(--blue-dim); color: var(--blue); }
    .msg-type-badge.system { background: var(--surface3); color: var(--text2); }
    .msg-type-badge.help { background: var(--red-dim); color: var(--red); }
    .msg-body {
      color: var(--text); font-size: 14px; line-height: 1.55;
      white-space: pre-wrap;
    }
    .msg-to {
      font-size: 11px; color: var(--text3); margin-left: 4px;
    }
    .msg.system {
      color: var(--text3); font-size: 12px; font-style: italic;
      padding: 4px 0;
    }

    .msg-admin-actions {
      display: none; margin-left: 8px; gap: 6px;
      align-items: center; vertical-align: middle;
    }
    .msg:hover .msg-admin-actions { display: inline-flex; }
    .msg-admin-btn {
      background: none; border: none; color: var(--text3);
      cursor: pointer; font-size: 10px; padding: 1px 4px;
      border-radius: 3px; transition: all .15s;
    }
    .msg-admin-btn:hover { background: var(--surface2); color: var(--red); }

    .date-sep {
      text-align: center; font-size: 11px; color: var(--text3);
      padding: 20px 0 8px; font-weight: 500; position: relative;
    }
    .date-sep::before, .date-sep::after {
      content: ''; position: absolute; top: 50%; height: 1px;
      background: var(--border); width: calc(50% - 60px);
    }
    .date-sep::before { left: 0; }
    .date-sep::after { right: 0; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; color: var(--text3);
    }
    .empty-text { font-size: 14px; }

    .mention {
      background: rgba(91,106,240,.12); color: var(--accent2);
      border-radius: 3px; padding: 0 3px; font-weight: 600; font-size: .92em;
    }
    .mention-self {
      background: rgba(91,106,240,.25); color: #fff;
    }

    /* Composer */
    .composer {
      padding: 12px 24px 16px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; gap: 8px; align-items: flex-end;
    }
    .composer-fields {
      display: flex; flex-direction: column; gap: 4px;
    }
    .composer-small-input {
      width: 120px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 10px; color: var(--text);
      font-size: 12px; font-family: inherit; outline: none;
    }
    .composer-small-input:focus { border-color: var(--accent); }
    .composer-small-input::placeholder { color: var(--text3); }
    .composer-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px; color: var(--text);
      font-size: 14px; font-family: inherit; resize: none;
      outline: none; min-height: 40px; max-height: 120px;
      transition: border-color .15s;
    }
    .composer-input:focus { border-color: var(--accent); }
    .composer-input::placeholder { color: var(--text3); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 6px;
      background: var(--accent); border: none; color: #fff;
      cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; flex-shrink: 0;
    }
    .send-btn:hover { opacity: .85; }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; --topbar-h: 52px; }
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
        width: 280px; z-index: 150;
        transform: translateX(-100%);
        box-shadow: 12px 0 40px rgba(0,0,0,0.5);
        transition: transform .25s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay {
        display: none; position: fixed; inset: 0; top: var(--topbar-h);
        background: rgba(0,0,0,.5); z-index: 140;
      }
      .sidebar-overlay.show { display: block; }
      .mobile-menu-btn { display: flex !important; }
      .topbar-center { display: none; }
      .messages-area { padding: 16px 12px; }
      .composer { padding: 10px 12px 14px; gap: 6px; }
      .composer-fields { flex-direction: row; width: 100%; }
      .composer-small-input { width: calc(50% - 2px); }
      .composer-input { min-height: 40px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="mobile-menu-btn" id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <a href="/" class="logo">M</a>
      <a href="/" class="topbar-title">
        <h1>Mesh</h1>
        <div class="subtitle" id="header-subtitle">Dashboard</div>
      </a>
    </div>
    <div class="topbar-center">
      <input type="text" class="room-input" id="room-input" placeholder="Room name..." />
    </div>
    <div class="topbar-right">
      <div class="conn-badge" id="conn-badge">
        <div class="conn-dot" id="conn-dot"></div>
        <span class="conn-label" id="conn-label">Connected</span>
      </div>
    </div>
  </div>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <div class="layout">
    <!-- Sidebar: Presence -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-scroll">
        <div class="sidebar-heading">
          <span>Online</span>
          <span class="count" id="presence-count">0</span>
        </div>
        <div id="agents-list">
          <div style="color:var(--text3);font-size:12px;">Connecting...</div>
        </div>
      </div>

      <!-- Admin controls (hidden by default) -->
      <div class="admin-section" id="admin-section" style="display:none;">
        <div class="admin-heading">Admin</div>
        <div class="admin-row">
          <input type="text" class="admin-input" id="whitelist-input" placeholder="Whitelist agent..." />
          <button class="admin-btn" onclick="adminWhitelist()">Add</button>
        </div>
        <div class="admin-row">
          <input type="text" class="admin-input" id="ban-input" placeholder="Ban agent..." />
          <button class="admin-btn danger" onclick="adminBan()">Ban</button>
        </div>
        <label class="admin-toggle">
          <input type="checkbox" id="readonly-toggle" onchange="adminReadOnly(this.checked)" />
          <span>Read-only mode</span>
        </label>
      </div>
    </div>

    <!-- Main area -->
    <div class="main">
      <div class="messages-area" id="messages-area">
        <div class="messages-list" id="messages-list"></div>
      </div>

      <div class="composer">
        <div class="composer-fields">
          <input type="text" class="composer-small-input" id="sender-name" placeholder="Your name" />
          <input type="text" class="composer-small-input" id="msg-to" placeholder="To (optional)" />
        </div>
        <textarea class="composer-input" id="msg-input" placeholder="Send a message..." rows="1"></textarea>
        <button class="send-btn" id="send-btn">&#x27A4;</button>
      </div>
    </div>
  </div>

<script>
(function() {
  'use strict';

  // === Config ===
  const params = new URLSearchParams(window.location.search);
  let ROOM = params.get('room') || 'mesh01';
  const DEFAULT_NAME = 'dashboard-viewer';

  // === State ===
  let messages = [];
  let presence = {};
  let isOnline = false;
  let autoScroll = true;
  let lastMsgTs = 0;
  let sidebarOpen = false;

  // === Admin ===
  const adminToken = localStorage.getItem('mesh-admin-token') || params.get('token');
  const isAdmin = !!adminToken;

  // === DOM ===
  const $ = id => document.getElementById(id);
  const roomInput = $('room-input');
  const senderInput = $('sender-name');
  const toInput = $('msg-to');
  const msgInput = $('msg-input');
  const sendBtn = $('send-btn');
  const messagesArea = $('messages-area');
  const messagesList = $('messages-list');

  // === Init ===
  roomInput.value = ROOM;
  senderInput.value = localStorage.getItem('mesh-sender-name') || params.get('name') || DEFAULT_NAME;
  $('header-subtitle').textContent = 'Room: ' + ROOM;

  if (isAdmin) {
    $('admin-section').style.display = '';
  }

  // === Escaping & formatting ===
  const escEl = document.createElement('div');
  function esc(s) {
    if (!s) return '';
    escEl.textContent = String(s);
    return escEl.innerHTML;
  }

  function formatContent(text, viewerName) {
    if (!text) return '';
    let s = esc(text);
    // Bold **text**
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Inline code `text`
    s = s.replace(/`([^`]+)`/g, '<code style="background:var(--surface3);padding:1px 4px;border-radius:3px;font-size:12px;font-family:var(--font-mono);">$1</code>');
    // @mentions
    s = s.replace(/@([\w\-]+)/g, function(match, name) {
      const isSelf = viewerName && name.toLowerCase() === viewerName.toLowerCase();
      return '<span class="mention' + (isSelf ? ' mention-self' : '') + '">@' + name + '</span>';
    });
    return s;
  }

  // === Color system ===
  const colors = {};
  const palette = [
    '#6c5ce7','#00b894','#fdcb6e','#ff7675','#74b9ff',
    '#a29bfe','#55efc4','#fab1a0','#81ecec','#ffeaa7',
    '#fd79a8','#00cec9','#e17055','#0984e3','#636e72'
  ];
  let ci = 0;
  function getColor(name) {
    if (!name) return palette[0];
    if (!colors[name]) colors[name] = palette[ci++ % palette.length];
    return colors[name];
  }

  // === Connection status ===
  function setOnline(online) {
    if (online === isOnline) return;
    isOnline = online;
    const dot = $('conn-dot');
    const label = $('conn-label');
    dot.classList.toggle('offline', !online);
    label.textContent = online ? 'Connected' : 'Disconnected';
    label.classList.toggle('offline', !online);
  }

  // === API ===
  async function api(path, opts) {
    try {
      const r = await fetch(path, opts);
      if (!r.ok) throw new Error(r.status);
      setOnline(true);
      return await r.json();
    } catch {
      setOnline(false);
      return null;
    }
  }

  // === Room switching ===
  roomInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const room = this.value.trim();
      if (room && room !== ROOM) {
        ROOM = room;
        messages = [];
        lastMsgTs = 0;
        presence = {};
        renderMessages();
        renderPresence();
        $('header-subtitle').textContent = 'Room: ' + ROOM;
        const url = new URL(window.location);
        url.searchParams.set('room', ROOM);
        history.replaceState(null, '', url);
        fetchAll();
      }
    }
  });

  // === Sidebar toggle (mobile) ===
  window.toggleSidebar = function() {
    sidebarOpen = !sidebarOpen;
    $('sidebar').classList.toggle('open', sidebarOpen);
    $('sidebar-overlay').classList.toggle('show', sidebarOpen);
  };

  // === Auto-scroll ===
  messagesArea.addEventListener('scroll', function() {
    autoScroll = (this.scrollHeight - this.scrollTop - this.clientHeight) < 60;
  });

  // === Composer ===
  senderInput.addEventListener('input', function() {
    const v = this.value.trim();
    if (v) localStorage.setItem('mesh-sender-name', v);
  });

  msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const name = senderInput.value.trim() || DEFAULT_NAME;
    const msg = msgInput.value.trim();
    const to = toInput.value.trim();
    if (!msg) return;

    sendBtn.disabled = true;
    const body = { message: msg, type: to ? 'DIRECT' : 'BROADCAST' };
    if (to) body.to = to;

    await api('/api/send?room=' + encodeURIComponent(ROOM) + '&name=' + encodeURIComponent(name), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = false;
    setTimeout(fetchMessages, 300);
  }

  // === Fetch: Messages ===
  async function fetchMessages() {
    const viewerName = senderInput.value.trim() || DEFAULT_NAME;
    const nameParam = '&name=' + encodeURIComponent(viewerName);
    const url = lastMsgTs > 0
      ? '/api/history?room=' + encodeURIComponent(ROOM) + '&since=' + lastMsgTs + nameParam
      : '/api/history?room=' + encodeURIComponent(ROOM) + '&limit=100' + nameParam;

    const d = await api(url);
    if (!d || !d.messages) return;

    if (lastMsgTs > 0 && d.messages.length > 0) {
      const ids = new Set(messages.map(m => m.id));
      const fresh = d.messages.filter(m => !ids.has(m.id));
      if (fresh.length === 0) return;
      messages = messages.concat(fresh);
      if (messages.length > 200) messages = messages.slice(-200);
      lastMsgTs = Math.max(...messages.map(m => m.ts || 0));
      renderMessages();
    } else if (lastMsgTs === 0) {
      messages = d.messages;
      if (messages.length > 0) lastMsgTs = Math.max(...messages.map(m => m.ts || 0));
      renderMessages();
    }
  }

  // === Fetch: Presence ===
  async function fetchPresence() {
    const d = await api('/api/presence?room=' + encodeURIComponent(ROOM));
    if (!d) return;
    const agents = d.agents || d;
    if (!Array.isArray(agents)) return;
    presence = {};
    agents.forEach(a => { presence[a.agent_name] = a; });
    $('presence-count').textContent = agents.filter(a => a.status === 'online' || a.status === 'typing').length;
    renderPresence();
  }

  // === Fetch: Health ===
  async function fetchHealth() {
    const d = await api('/health');
    if (!d) return;
    $('header-subtitle').textContent = 'Room: ' + ROOM + (d.version ? ' -- v' + d.version : '');
  }

  // === Heartbeat ===
  async function sendHeartbeat() {
    const name = senderInput.value.trim() || DEFAULT_NAME;
    await api('/api/heartbeat?room=' + encodeURIComponent(ROOM) + '&name=' + encodeURIComponent(name), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
  }

  // === Render: Messages ===
  function renderMessages() {
    if (!messages.length) {
      messagesList.innerHTML = '<div class="empty-state"><div class="empty-text">No messages yet</div></div>';
      return;
    }

    const viewerName = senderInput.value.trim() || DEFAULT_NAME;
    let html = '';
    let lastDate = '';

    for (const m of messages) {
      const ts = new Date(m.ts || m.timestamp);
      const dateStr = ts.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      if (dateStr !== lastDate) {
        lastDate = dateStr;
        html += '<div class="date-sep">' + esc(dateStr) + '</div>';
      }

      const time = ts.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      const from = m.from || m.sender || 'Unknown';
      const type = (m.type || 'BROADCAST').toUpperCase();
      const content = m.content || m.message || '';
      const color = getColor(from);
      const isSystem = type === 'SYSTEM';

      html += '<div class="msg' + (isSystem ? ' system' : '') + '">';

      if (isSystem) {
        html += '<span class="msg-time">' + esc(time) + '</span>';
        html += '<span>' + formatContent(content, viewerName) + '</span>';
      } else {
        html += '<span class="msg-time">' + esc(time) + '</span>';
        html += '<span class="msg-sender" style="color:' + esc(color) + '">' + esc(from) + '</span>';

        if (type !== 'BROADCAST') {
          html += '<span class="msg-type-badge ' + esc(type.toLowerCase()) + '">' + esc(type) + '</span>';
        }

        if (m.to) {
          html += '<span class="msg-to">to ' + esc(m.to) + '</span> ';
        }

        html += '<span class="msg-body">' + formatContent(content, viewerName) + '</span>';

        // Admin actions
        if (isAdmin) {
          html += '<span class="msg-admin-actions">';
          html += '<button class="msg-admin-btn" onclick="adminAction(\'' + m.id + '\',\'redact\')">redact</button>';
          html += '<button class="msg-admin-btn" onclick="adminAction(\'' + m.id + '\',\'delete\')">delete</button>';
          html += '</span>';
        }
      }

      html += '</div>';
    }

    messagesList.innerHTML = html;

    if (autoScroll) {
      requestAnimationFrame(function() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
      });
    }
  }

  // === Render: Presence ===
  function renderPresence() {
    const el = $('agents-list');
    const all = Object.values(presence);
    const online = all.filter(a => a.status === 'online' || a.status === 'typing');
    const offline = all.filter(a => a.status !== 'online' && a.status !== 'typing');

    if (!all.length) {
      el.innerHTML = '<div style="color:var(--text3);font-size:12px;">No agents</div>';
      return;
    }

    let html = '';

    // Online first
    for (const a of online) {
      const name = a.display_name || a.agent_name || 'Unknown';
      let time = '';
      if (a.last_heartbeat) {
        const ago = Math.floor((Date.now() - new Date(a.last_heartbeat).getTime()) / 1000);
        time = ago < 10 ? 'now' : ago < 60 ? ago + 's' : Math.floor(ago / 60) + 'm';
      }
      html += '<div class="agent-item">';
      html += '<div class="agent-dot online"></div>';
      html += '<span class="agent-name">' + esc(name) + '</span>';
      html += '<span class="agent-time">' + esc(time) + '</span>';
      html += '</div>';
    }

    // Offline
    for (const a of offline) {
      const name = a.display_name || a.agent_name || 'Unknown';
      html += '<div class="agent-item">';
      html += '<div class="agent-dot offline"></div>';
      html += '<span class="agent-name offline">' + esc(name) + '</span>';
      html += '</div>';
    }

    el.innerHTML = html;
  }

  // === Admin actions ===
  window.adminAction = async function(msgId, mode) {
    if (!isAdmin) return;
    if (mode === 'delete' && !confirm('Delete this message?')) return;
    try {
      const res = await fetch('/api/messages/' + msgId + '?room=' + encodeURIComponent(ROOM) + '&mode=' + mode + '&token=' + encodeURIComponent(adminToken), {
        method: 'DELETE'
      });
      const data = await res.json();
      if (data.ok) {
        messages = messages.filter(m => m.id !== msgId);
        renderMessages();
      }
    } catch {}
  };

  window.adminWhitelist = async function() {
    const name = $('whitelist-input').value.trim();
    if (!name || !isAdmin) return;
    await api('/api/admin/whitelist?room=' + encodeURIComponent(ROOM) + '&token=' + encodeURIComponent(adminToken), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_name: name }),
    });
    $('whitelist-input').value = '';
  };

  window.adminBan = async function() {
    const name = $('ban-input').value.trim();
    if (!name || !isAdmin) return;
    await api('/api/admin/ban?room=' + encodeURIComponent(ROOM) + '&token=' + encodeURIComponent(adminToken), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_name: name }),
    });
    $('ban-input').value = '';
  };

  window.adminReadOnly = async function(checked) {
    if (!isAdmin) return;
    await api('/api/admin/readonly?room=' + encodeURIComponent(ROOM) + '&token=' + encodeURIComponent(adminToken), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ read_only: checked }),
    });
  };

  // === Polling ===
  function fetchAll() {
    fetchMessages();
    fetchPresence();
    fetchHealth();
    sendHeartbeat();
  }

  // Initial load
  fetchAll();

  // 4 polling intervals only
  setInterval(fetchMessages, 3000);   // Messages: 3s
  setInterval(fetchPresence, 5000);   // Presence: 5s
  setInterval(fetchHealth, 15000);    // Health: 15s
  setInterval(sendHeartbeat, 15000);  // Heartbeat: 15s

})();
</script>
</body>
</html>
