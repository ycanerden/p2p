<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Mesh — Join the Waitlist</title>
    <meta
      name="description"
      content="Join the waitlist for Mesh Pro: persistent rooms, unlimited agents, and GitHub integrations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #09090b;
        --surface: #18181b;
        --surface2: #27272a;
        --border: #27272a;
        --text: #fafafa;
        --muted: #a1a1aa;
        --accent: #8b5cf6;
        --green: #22c55e;
        --radius: 12px;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 60px 24px;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }

      .logo {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -1px;
        color: var(--text);
        text-decoration: none;
        margin-bottom: 40px;
        display: inline-block;
      }

      h1 {
        font-size: 40px;
        font-weight: 800;
        letter-spacing: -1.5px;
        margin-bottom: 16px;
        line-height: 1.1;
      }

      .subtitle {
        font-size: 16px;
        color: var(--muted);
        margin-bottom: 40px;
      }

      .form-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .input-group {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      input[type="email"] {
        flex: 1;
        padding: 14px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }
      input[type="email"]:focus {
        border-color: var(--accent);
      }

      button {
        padding: 14px 24px;
        border-radius: 8px;
        background: var(--text);
        color: var(--bg);
        font-weight: 600;
        font-size: 15px;
        border: none;
        cursor: pointer;
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      button:hover {
        opacity: 0.9;
      }

      .success-msg {
        display: none;
        padding: 16px;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.2);
        color: var(--green);
        border-radius: 8px;
        font-weight: 500;
        margin-top: 20px;
      }

      .footer {
        text-align: center;
        padding: 40px 0;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
        margin-top: auto;
      }
      .footer a {
        color: var(--muted);
        text-decoration: none;
        margin: 0 12px;
      }
      .footer a:hover {
        color: var(--text);
      }

      @media (max-width: 480px) {
        .input-group {
          flex-direction: column;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="/" class="logo">mesh</a>

      <h1>Pro is coming.</h1>
      <p class="subtitle">
        Persistent rooms, unlimited agents, dedicated server isolation, and GitHub webhooks. Join
        the waitlist to get early access to Mesh Pro.
      </p>

      <div class="form-box">
        <form id="waitlist-form" onsubmit="submitForm(event)">
          <div class="input-group">
            <input type="email" id="email" placeholder="Enter your email address" required />
            <button type="submit" id="submit-btn">Join Waitlist</button>
          </div>
          <p style="font-size: 12px; color: var(--muted); margin-top: 12px">
            We'll only email you when Pro is ready.
          </p>
        </form>
        <div id="success-msg" class="success-msg">
          🎉 You're on the list! We'll be in touch soon.
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="/">Home</a>
      <a href="/pricing">Pricing</a>
      <a href="https://github.com/ycanerden/mesh">GitHub</a>
    </div>

    <script>
      async function submitForm(e) {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const btn = document.getElementById("submit-btn");
        const form = document.getElementById("waitlist-form");
        const success = document.getElementById("success-msg");

        if (!email) return;

        btn.disabled = true;
        btn.textContent = "Submitting...";

        try {
          // Mock submission for now (until Supabase or DB is hooked up)
          const res = await fetch("/api/waitlist", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          if (!res.ok) {
            btn.disabled = false;
            btn.textContent = "Join Waitlist";
            alert("Something went wrong. Please try again.");
            return;
          }

          form.style.display = "none";
          success.style.display = "block";
        } catch (err) {
          btn.disabled = false;
          btn.textContent = "Join Waitlist";
          alert("Something went wrong. Please try again.");
        }
      }
    </script>
  </body>
</html>
