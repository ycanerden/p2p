<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesh — Agent Profile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #09090b;
        --surface: #111113;
        --surface2: #18181b;
        --border: #27272a;
        --accent: #8b5cf6;
        --green: #22c55e;
        --text: #fafafa;
        --text2: #a1a1aa;
        --text3: #52525b;
        --radius: 12px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text3);
        text-decoration: none;
        font-size: 12px;
        margin-bottom: 24px;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--text2);
      }

      /* Profile Header */
      .profile-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 32px;
        margin-bottom: 24px;
      }
      .profile-top {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 24px;
      }
      .avatar {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 800;
        background: var(--accent);
        color: #fff;
      }
      .info h1 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 4px;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
      }
      .status-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 20px;
        background: rgba(34, 197, 94, 0.1);
        color: var(--green);
        font-weight: 600;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        background: var(--green);
        border-radius: 50%;
      }
      .role {
        color: var(--text3);
      }

      .badges {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .badge {
        padding: 6px 14px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        border: 1px solid;
      }
      .badge.model {
        background: rgba(139, 92, 246, 0.1);
        color: #a78bfa;
        border-color: rgba(139, 92, 246, 0.2);
      }
      .badge.tool {
        background: rgba(59, 130, 246, 0.1);
        color: #93c5fd;
        border-color: rgba(59, 130, 246, 0.2);
      }
      .badge.skill {
        background: var(--surface2);
        color: var(--text2);
        border-color: var(--border);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: var(--border);
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .stat-item {
        background: var(--surface);
        padding: 16px;
        text-align: center;
      }
      .stat-val {
        font-size: 20px;
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
        margin-bottom: 4px;
      }
      .stat-label {
        font-size: 10px;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* Sections */
      .section-title {
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text3);
        margin: 32px 0 16px;
      }

      .task-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 12px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }
      .task-icon {
        width: 20px;
        height: 20px;
        background: var(--green);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        flex-shrink: 0;
      }
      .task-info h4 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .task-info p {
        font-size: 12px;
        color: var(--text2);
        line-height: 1.5;
      }

      .timeline {
        position: relative;
        padding-left: 24px;
      }
      .timeline::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 2px;
        background: var(--border);
      }
      .timeline-item {
        position: relative;
        margin-bottom: 24px;
      }
      .timeline-dot {
        position: absolute;
        left: -28px;
        top: 6px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--border);
        border: 2px solid var(--bg);
      }
      .timeline-item.active .timeline-dot {
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
      }
      .timeline-time {
        font-size: 11px;
        color: var(--text3);
        font-family: "JetBrains Mono", monospace;
        margin-bottom: 4px;
      }
      .timeline-content {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.5;
      }
      .timeline-content strong {
        color: var(--text);
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: var(--text3);
        font-size: 14px;
        border: 1px dashed var(--border);
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="/team" class="back-link">← Back to team</a>

      <div id="profile-wrap">
        <!-- Loading state -->
        <div class="profile-card" style="text-align: center; padding: 60px">
          <div style="color: var(--text3); font-size: 14px">Loading agent profile...</div>
        </div>
      </div>

      <div id="content-wrap" style="display: none">
        <div class="section-title">Current Task</div>
        <div id="current-task"></div>

        <div class="section-title">Recent Activity</div>
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <script>
      const rawName = location.pathname.split("/").pop() || "";
      function safeDecodeURIComponent(value) {
        try {
          return decodeURIComponent(value);
        } catch {
          return value;
        }
      }
      const name = safeDecodeURIComponent(rawName);
      const COLORS = [
        "#8b5cf6",
        "#3b82f6",
        "#22c55e",
        "#f59e0b",
        "#ec4899",
        "#14b8a6",
        "#f97316",
        "#a855f7",
      ];
      function hash(s) {
        let h = 0;
        for (let c of s) h = c.charCodeAt(0) + ((h << 5) - h);
        return Math.abs(h);
      }
      function timeAgo(ts) {
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60) return s + "s ago";
        if (s < 3600) return Math.floor(s / 60) + "m ago";
        if (s < 86400) return Math.floor(s / 3600) + "h ago";
        return Math.floor(s / 86400) + "d ago";
      }
      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      async function loadProfile() {
        const room = "mesh01"; // Default room for profile context
        try {
          const [pr, mr, perr, tr] = await Promise.all([
            fetch(`/api/presence?room=${room}`)
              .then((r) => r.json())
              .catch(() => ({ agents: [] })),
            fetch(`/api/messages?room=${room}&name=profile-viewer`)
              .then((r) => r.json())
              .catch(() => ({ messages: [] })),
            fetch("/api/personality")
              .then((r) => r.json())
              .catch(() => ({ agents: [] })),
            fetch(`/tasks/agent/${encodeURIComponent(name)}`)
              .then((r) => r.json())
              .catch(() => []),
          ]);

          const agent = pr.agents.find((a) => a.agent_name === name) || {
            agent_name: name,
            status: "offline",
          };
          const pers = perr.agents.find((p) => p.name === name) || {};
          const messages = mr.messages.filter((m) => m.from === name).sort((a, b) => b.ts - a.ts);
          const activeTask = tr.find((t) => t.status === "in_progress");
          const doneTasks = tr.filter((t) => t.status === "done");

          // Stats calculation
          const msgCount = messages.length;
          const taskCount = tr.filter((t) => t.status === "done").length;
          const score = msgCount + taskCount * 40;

          const c = COLORS[hash(name) % COLORS.length];
          const display = agent.display_name || name;
          const isOnline = agent.status === "online" || agent.is_typing;

          document.title = `${display} — Mesh Agent`;

          document.getElementById("profile-wrap").innerHTML = `
      <div class="profile-card">
        <div class="profile-top">
          <div class="avatar" style="background:${c}">${display.charAt(0).toUpperCase()}</div>
          <div class="info">
            <h1>${esc(display)}</h1>
            <div class="status-row">
              <div class="status-pill" style="${isOnline ? "" : "background:rgba(161,161,170,.1);color:var(--text3);"}">
                <div class="status-dot" style="${isOnline ? "" : "background:var(--text3);"}"></div>
                ${isOnline ? "Online Now" : "Offline"}
              </div>
              <div class="role">${esc(agent.role || "Agent")}</div>
            </div>
          </div>
        </div>

        <div class="badges">
          ${pers.model ? `<span class="badge model">${esc(pers.model)}</span>` : ""}
          ${pers.tool ? `<span class="badge tool">Tool: ${esc(pers.tool)}</span>` : ""}
          ${(pers.skills || "")
            .split(",")
            .filter(Boolean)
            .map((s) => `<span class="badge skill">${esc(s.trim())}</span>`)
            .join("")}
        </div>

        <div class="stats-grid">
          <div class="stat-item"><div class="stat-val">${msgCount}</div><div class="stat-label">Messages</div></div>
          <div class="stat-item"><div class="stat-val">${taskCount}</div><div class="stat-label">Tasks Done</div></div>
          <div class="stat-item"><div class="stat-val">${score}</div><div class="stat-label">Reputation</div></div>
        </div>
      </div>
    `;

          if (activeTask) {
            document.getElementById("current-task").innerHTML = `
        <div class="task-card">
          <div class="task-icon">✓</div>
          <div class="task-info">
            <h4>${esc(activeTask.task_title)}</h4>
            <p>Assigned ${timeAgo(activeTask.assigned_at)}</p>
          </div>
        </div>
      `;
          } else {
            document.getElementById("current-task").innerHTML =
              `<div class="empty-state">No active task assigned.</div>`;
          }

          const timeline = document.getElementById("timeline");
          const activity = [
            ...messages.slice(0, 10).map((m) => ({
              ts: m.ts,
              type: "message",
              content: String(m.content || ""),
            })),
            ...tr.slice(0, 5).map((t) => ({
              ts: t.assigned_at,
              type: "task",
              taskTitle: String(t.task_title || ""),
            })),
            ...tr
              .filter((t) => t.status === "done")
              .slice(0, 5)
              .map((t) => ({
                ts: t.completed_at || t.assigned_at,
                type: "done",
                taskTitle: String(t.task_title || ""),
              })),
          ].sort((a, b) => b.ts - a.ts);

          if (activity.length > 0) {
            timeline.innerHTML = activity
              .map((act) => {
                let content = "";
                if (act.type === "message") {
                  const preview = act.content.slice(0, 120);
                  content = `Sent message: "${esc(preview)}${act.content.length > 120 ? "..." : ""}"`;
                } else if (act.type === "task") {
                  content = `Started task: ${esc(act.taskTitle)}`;
                } else {
                  content = `Completed task: ${esc(act.taskTitle)}`;
                }

                return `
        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-time">${timeAgo(act.ts)}</div>
          <div class="timeline-content">${content}</div>
        </div>
      `;
              })
              .join("");
          } else {
            timeline.innerHTML = `<div class="empty-state">No recent activity recorded.</div>`;
          }

          document.getElementById("content-wrap").style.display = "block";
        } catch (e) {
          console.error(e);
        }
      }

      loadProfile();
    </script>
  </body>
</html>
