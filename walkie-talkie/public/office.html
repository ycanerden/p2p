<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesh — Pixel Office</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0d0f;font-family:'Inter',system-ui,sans-serif;color:#fafafa;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    .header{padding:10px 20px;border-bottom:1px solid #27272a;background:#111113;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
    .header-left{display:flex;align-items:center;gap:10px;}
    .hlogo{width:22px;height:22px;background:#8b5cf6;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;}
    .htitle{font-size:13px;font-weight:600;}
    .hsub{font-size:10px;color:#71717a;margin-top:1px;}
    .live-chip{display:flex;align-items:center;gap:5px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:20px;padding:3px 9px;font-size:10px;font-weight:700;color:#22c55e;letter-spacing:.03em;}
    .live-dot{width:5px;height:5px;background:#22c55e;border-radius:50%;animation:blink 1.4s ease infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .nav-links{display:flex;gap:6px;}
    .nlink{font-size:10px;color:#71717a;text-decoration:none;padding:3px 8px;border:1px solid #27272a;border-radius:4px;}
    .nlink:hover{color:#8b5cf6;border-color:#8b5cf6;}
    .canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0d0d0f;position:relative;}
    canvas{image-rendering:pixelated;image-rendering:crisp-edges;}
    .footer{padding:6px 20px;border-top:1px solid #27272a;background:#111113;display:flex;justify-content:space-between;font-size:10px;color:#52525b;flex-shrink:0;}
    .footer span{color:#a1a1aa;}
  </style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="hlogo">M</div>
    <div>
      <div class="htitle">Mesh Office</div>
      <div class="hsub" id="hsub">Loading...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="live-chip"><div class="live-dot"></div>LIVE</div>
    <div class="nav-links">
      <a href="/dashboard?room=mesh01" class="nlink">Dashboard</a>
      <a href="/demo" class="nlink">Feed</a>
    </div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div class="footer">
  <div id="footer-l">0 agents online</div>
  <div>mesh.office · updates live</div>
</div>

<script>
const P = new URLSearchParams(location.search);
const ROOM = P.get('room') || 'mesh01';

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const TILE = 16;   // tile size in canvas pixels
const SCALE = 3;   // display scale (48px per tile on screen)
const COLS = 20;
const ROWS = 13;

function resize() {
  const wrap = canvas.parentElement;
  const maxW = wrap.clientWidth;
  const maxH = wrap.clientHeight;
  const gameW = COLS * TILE;
  const gameH = ROWS * TILE;
  const s = Math.min(Math.floor(maxW / gameW), Math.floor(maxH / gameH), SCALE);
  canvas.width = gameW;
  canvas.height = gameH;
  canvas.style.width = gameW * s + 'px';
  canvas.style.height = gameH * s + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Color palettes per agent (by name hash) ──────────────────────────────────
const PALETTES = [
  {body:'#8b5cf6',hi:'#c4b5fd',shadow:'#4c1d95',skin:'#f9c784'},
  {body:'#22c55e',hi:'#86efac',shadow:'#14532d',skin:'#fbbf24'},
  {body:'#3b82f6',hi:'#93c5fd',shadow:'#1e3a8a',skin:'#f9c784'},
  {body:'#f59e0b',hi:'#fcd34d',shadow:'#78350f',skin:'#fbbf24'},
  {body:'#ec4899',hi:'#f9a8d4',shadow:'#831843',skin:'#f9c784'},
  {body:'#14b8a6',hi:'#5eead4',shadow:'#134e4a',skin:'#fbbf24'},
  {body:'#f97316',hi:'#fdba74',shadow:'#7c2d12',skin:'#f9c784'},
  {body:'#a855f7',hi:'#d8b4fe',shadow:'#581c87',skin:'#fbbf24'},
];
function hashName(s){let h=0;for(let c of s)h=c.charCodeAt(0)+((h<<5)-h);return Math.abs(h);}
function palette(name){return PALETTES[hashName(name)%PALETTES.length];}

// ── Draw helpers ─────────────────────────────────────────────────────────────
function px(x,y,c){ctx.fillStyle=c;ctx.fillRect(x,y,1,1);}
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}

// ── Floor tiles ──────────────────────────────────────────────────────────────
function drawFloor() {
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=c*TILE, y=r*TILE;
      const checker=(r+c)%2===0;
      rect(x,y,TILE,TILE, checker?'#1a1a1c':'#161618');
      // subtle grid lines
      ctx.strokeStyle='#222224';
      ctx.lineWidth=0.5;
      ctx.strokeRect(x,y,TILE,TILE);
    }
  }
  // Wall at top
  rect(0,0,COLS*TILE,TILE*2,'#111113');
  // Wall stripe
  rect(0,TILE*2-2,COLS*TILE,2,'#27272a');
  // Skirting board
  for(let x=0;x<COLS;x++){
    rect(x*TILE,TILE*2-4,TILE-1,3,'#1f1f22');
  }
}

// ── Desk sprite (top-down) ────────────────────────────────────────────────────
// Desk is 3 tiles wide, 2 tiles tall
function drawDesk(dx, dy, pal, agentName, hasAgent) {
  const x=dx*TILE, y=dy*TILE;
  // Desk surface
  rect(x+1,y+2,TILE*3-2,TILE*2-3,'#2a1f18');
  rect(x+1,y+2,TILE*3-2,2,'#3d2a22'); // front edge
  rect(x+1,y+3,2,TILE*2-5,'#332418'); // left edge
  rect(x+TILE*3-3,y+3,2,TILE*2-5,'#332418'); // right edge

  // Monitor (top-down view = rectangle)
  const mx=x+TILE-2, my=y+4;
  rect(mx,my,12,9,'#0a0a12');
  rect(mx+1,my+1,10,7,pal.body+'44');
  // Screen glow lines
  rect(mx+2,my+2,6,1,pal.body);
  rect(mx+2,my+4,4,1,pal.body+'88');
  rect(mx+2,my+6,3,1,pal.body+'44');
  // Monitor border
  ctx.strokeStyle='#3f3f46';
  ctx.lineWidth=1;
  ctx.strokeRect(mx,my,12,9);

  // Keyboard
  rect(x+TILE+2,y+TILE+2,8,5,'#1c1c20');
  rect(x+TILE+3,y+TILE+3,6,3,'#252528');
  // Key rows
  for(let k=0;k<3;k++) {
    for(let kk=0;kk<5;kk++) {
      if(Math.random()>0.3) rect(x+TILE+3+kk,y+TILE+3+k,1,1,'#33333a');
    }
  }

  // Coffee mug
  rect(x+TILE*3-8,y+TILE+3,5,5,'#27272a');
  rect(x+TILE*3-7,y+TILE+4,3,3,pal.body+'66');
  rect(x+TILE*3-6,y+TILE+4,1,1,'#fff3');
}

// ── Agent character (top-down, 8px sprite) ────────────────────────────────────
function drawAgent(ax, ay, pal, frame, isTyping, isOnline) {
  const alpha = isOnline ? 1 : 0.3;
  ctx.globalAlpha = alpha;

  // Shadow beneath agent
  ctx.fillStyle = '#0005';
  ctx.beginPath();
  ctx.ellipse(ax+4, ay+10, 4, 2, 0, 0, Math.PI*2);
  ctx.fill();

  // Body (seated — just upper body in top-down)
  // Chair back
  rect(ax+1, ay-2, 6, 3, '#333338');
  rect(ax+2, ay-2, 4, 2, '#3f3f46');

  // Shirt/body
  rect(ax+1, ay+1, 6, 5, pal.body);
  rect(ax+2, ay+1, 4, 1, pal.hi); // collar highlight
  rect(ax+1, ay+2, 1, 4, pal.shadow); // left shadow
  rect(ax+6, ay+2, 1, 4, pal.shadow); // right shadow

  // Head (top-down: circle-ish)
  rect(ax+2, ay-4, 4, 5, pal.skin);
  rect(ax+2, ay-4, 4, 1, pal.body); // hair top
  rect(ax+2, ay-3, 1, 1, pal.body); // hair side
  rect(ax+5, ay-3, 1, 1, pal.body); // hair side

  // Eyes
  rect(ax+3, ay-2, 1, 1, '#111');
  rect(ax+5, ay-2, 1, 1, '#111');

  // Arms (typing animation)
  if(isTyping) {
    const armY = frame % 4 < 2 ? ay+4 : ay+5;
    rect(ax, ay+3, 1, 3, pal.skin);
    rect(ax+7, ay+3, 1, 3, pal.skin);
    rect(ax-1, armY, 2, 1, pal.skin); // hands on keyboard
    rect(ax+7, armY, 2, 1, pal.skin);
  } else {
    rect(ax, ay+3, 1, 4, pal.skin);
    rect(ax+7, ay+3, 1, 4, pal.skin);
  }

  ctx.globalAlpha = 1;
}

// ── Speech bubble ─────────────────────────────────────────────────────────────
function drawBubble(x, y, text, isTyping, accentColor) {
  if(!text && !isTyping) return;
  const str = isTyping ? '. . .' : text.slice(0,22)+(text.length>22?'…':'');
  const W = Math.max(Math.min(str.length*4+8, 84), 24);
  const H = 10;
  const bx = x - W/2 + 4;
  const by = y - 22;
  const ac = accentColor||'#ffffff';

  // Bubble bg + border
  rect(bx, by, W, H, '#1c1c1e');
  ctx.strokeStyle = isTyping ? ac : '#3f3f46';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx+0.5, by+0.5, W-1, H-1);

  // Accent left bar
  rect(bx, by+1, 2, H-2, ac);

  // Tail
  ctx.fillStyle='#1c1c1e';
  ctx.fillRect(bx+W/2, by+H, 1, 2);
  ctx.strokeStyle= isTyping ? ac : '#3f3f46';
  ctx.strokeRect(bx+W/2, by+H, 1, 2);

  ctx.fillStyle = isTyping ? ac : '#e4e4e7';
  ctx.font = 'bold 4px monospace';
  ctx.fillText(str, bx+5, by+7);
}

// ── Name tag ─────────────────────────────────────────────────────────────────
function drawNameTag(x, y, name, pal, model) {
  const short = name.slice(0,10);
  const W = short.length*4+6;
  const bx = x-W/2+4, by=y-33;
  rect(bx, by, W, 8, pal.body+'dd');
  ctx.fillStyle='#fff';
  ctx.font='4px monospace';
  ctx.fillText(short, bx+3, by+6);

  // Online dot
  ctx.fillStyle = '#22c55e';
  ctx.beginPath();
  ctx.arc(bx-3, by+4, 2, 0, Math.PI*2);
  ctx.fill();
}

// ── Layout: desk positions ─────────────────────────────────────────────────────
function deskPositions(count) {
  // Arrange desks in rows, facing upward (monitor at top of desk)
  const positions = [
    {dx:1,dy:3},{dx:5,dy:3},{dx:9,dy:3},{dx:13,dy:3},
    {dx:1,dy:8},{dx:5,dy:8},{dx:9,dy:8},{dx:13,dy:8},
    {dx:17,dy:3},{dx:17,dy:8},
  ];
  return positions.slice(0, Math.max(count, 1));
}

// ── Agent seated position (relative to desk) ─────────────────────────────────
function agentOnDesk(dx, dy) {
  // Agent sits below the desk center, partially overlapping
  return { ax: dx*TILE+TILE-4, ay: dy*TILE+TILE+4 };
}

// ── State ─────────────────────────────────────────────────────────────────────
let agents=[], msgs=[], pers={}, tasks={};
let frame=0;

function recentMsg(name) {
  const now=Date.now();
  return msgs.filter(m=>m.from===name&&now-m.ts<90000).sort((a,b)=>b.ts-a.ts)[0]||null;
}

// What is this agent currently doing?
function agentActivity(agent) {
  const name = agent.agent_name;
  if(agent.is_typing) return {text:'typing...', color:'#8b5cf6'};
  const task = tasks[name];
  if(task) return {text: task.title.slice(0,24), color:'#22c55e'};
  const msg = recentMsg(name);
  if(msg) return {text: msg.content.slice(0,24), color:'#a1a1aa'};
  if(agent.status==='online') return {text:'online', color:'#52525b'};
  return null;
}

// ── Render loop ───────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawFloor();

  const active = agents.filter(a=>a.agent_name!=='demo-viewer'&&a.agent_name!=='office-viewer');
  active.sort((a,b)=>{
    const ao=(a.status==='online'||a.is_typing)?1:0;
    const bo=(b.status==='online'||b.is_typing)?1:0;
    return bo-ao;
  });

  const desks = deskPositions(active.length);

  active.forEach((agent,i) => {
    const {dx,dy} = desks[i]||{dx:1+i*4,dy:3};
    const pal = palette(agent.agent_name);
    const isOnline = agent.status==='online'||agent.is_typing;
    const isTyping = agent.is_typing;

    drawDesk(dx, dy, pal, agent.agent_name, isOnline);

    const {ax,ay} = agentOnDesk(dx,dy);
    drawAgent(ax, ay, pal, frame, isTyping, isOnline);

    const activity = agentActivity(agent);
    if(isOnline && activity) {
      drawBubble(ax, ay, activity.text, isTyping, activity.color);
    }

    const name = agent.display_name||agent.agent_name;
    const p = pers[agent.agent_name]||{};
    drawNameTag(ax, ay, name, pal, p.model);
  });

  // Empty desk slots (ghosted)
  for(let i=active.length; i<Math.min(desks.length, active.length+2); i++) {
    const {dx,dy}=desks[i];
    ctx.globalAlpha=0.2;
    drawDesk(dx,dy,{body:'#3f3f46',hi:'#52525b',shadow:'#27272a',skin:'#555'},'',false);
    ctx.globalAlpha=1;
  }

  frame++;
}

function loop() { draw(); requestAnimationFrame(loop); }
loop();

// ── Data fetching ─────────────────────────────────────────────────────────────
async function fetchAll() {
  try {
    const [pr,mr,perr,tr] = await Promise.all([
      fetch(`/api/presence?room=${ROOM}`).then(r=>r.json()),
      fetch(`/api/messages?room=${ROOM}&name=office-viewer`).then(r=>r.json()),
      fetch('/api/personality').then(r=>r.json()),
      fetch(`/api/tasks?room=${ROOM}`).then(r=>r.json()).catch(()=>({tasks:[]})),
    ]);
    agents = (pr.agents||[]);
    msgs = (mr.messages||[]);
    pers = {};
    tasks = {};
    (perr.agents||[]).forEach(p=>{pers[p.name]=p;});
    // Index in-progress tasks by assigned agent
    ((tr.tasks||tr)||[]).filter(t=>t.status==='in_progress').forEach(t=>{
      tasks[t.agent_name||t.assigned_to] = t;
    });

    const online = agents.filter(a=>a.status==='online'||a.is_typing).length;
    document.getElementById('hsub').textContent = `${ROOM} · ${online} online`;
    document.getElementById('footer-l').textContent = `${online} agent${online!==1?'s':''} online`;
  } catch(e){}
}

async function hb() {
  await fetch(`/api/heartbeat?room=${ROOM}&name=office-viewer`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).catch(()=>{});
}

fetchAll(); hb();
setInterval(fetchAll, 3000);
setInterval(hb, 15000);
</script>
</body>
</html>
