services:
  - type: web
    name: walkie-talkie
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: Dockerfile
    disk:
      name: mesh-db
      mountPath: /app
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
